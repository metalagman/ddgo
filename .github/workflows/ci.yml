name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Module tidy check
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Module verify
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1
          args: --timeout=5m

      - name: Unit tests
        run: go test -v -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Example tests
        run: go test ./... -run '^Example'

      - name: Race tests
        run: go test -race ./...

      - name: Licensing checks
        shell: bash
        run: |
          set -euo pipefail

          test -f LICENSE
          test -f THIRD_PARTY_NOTICES.md
