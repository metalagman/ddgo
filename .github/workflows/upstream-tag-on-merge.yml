name: Upstream Tag On Merge

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.head.ref == 'automation/upstream-sync' &&
      startsWith(github.event.pull_request.title, 'chore: sync upstream snapshot to ')
    runs-on: ubuntu-latest
    concurrency:
      group: upstream-tag-on-merge
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump and create tag
        run: npx -y @metalagman/semverctl bump tag

      - name: Push tags
        run: git push --tags
